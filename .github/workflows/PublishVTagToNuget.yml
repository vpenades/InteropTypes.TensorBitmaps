name: Publish V.Tag to NuGet.org

on:
  push:
    # publish only on tags like v1.2.3 (or v1.2)
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:      
      id-token: write # enable GitHub OIDC token issuance for this job

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Determine package version
        id: version
        run: |
          # If this run was triggered by a tag, extract the tag name and strip a leading "v" if present.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag=${GITHUB_REF#refs/tags/}
            # strip leading v if present
            tag=${tag#v}
            echo "PACKAGE_VERSION=$tag" >> $GITHUB_ENV
          else
            # fallback CI version if not a tag
            echo "PACKAGE_VERSION=0.0.0-ci-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi
          echo "Determined PACKAGE_VERSION=$PACKAGE_VERSION"

      - name: Restore
        run: dotnet restore      

      - name: Pack
        run: |
          mkdir -p artifacts          
          dotnet pack --configuration Release -o artifacts /p:PackageVersion=${PACKAGE_VERSION}

      # ------------------------------------------ Push packages

      # Get a short-lived NuGet API key
      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER_NAME }}

      - name: NuGet push
        run: dotnet nuget push "*.nupkg" --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json